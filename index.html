<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Selamat Tidur Ambar ❤️</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#ffb6c1;
    overflow:hidden;
}

#halaman1,#halaman2{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#halaman2{
    display:none;
    animation:fade 1s;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
}

img{
    width:250px;
    border-radius:20px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}
    .fade img{
    animation: munculFoto 2s ease;
}

@keyframes munculFoto{
    from{
        opacity:0;
        transform:scale(0.7);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<div id="halaman1">
    <h1>Selamat Tidur Ambar ❤️</h1>
    <p>Klik tombol di bawah yaa ✨</p>
    <button onclick="masuk()">Klik Aku</button>
</div>

<div id="halaman2" class="fade">
    <img src="IMG-20260622-WA0023.jpg">
    <h1>Selamat Tidur Ambar ❤️</h1>
    <p>Semoga mimpi indah 🌙✨</p>
    <p>Aku sayang kamu ❤️</p>
</div>

<script>
function masuk(){
    document.getElementById("halaman1").style.display="none";
    document.getElementById("halaman2").style.display="flex";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Selamat Tidur Ambar ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  background:#ffb6c1;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  font-family:sans-serif;
  text-align:center;
}
.box{
  background:white;
  padding:20px;
  border-radius:20px;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
}
</style>
</head>
<body>
<div class="box">
<h1>Selamat Tidur Ambar ❤️</h1>
<p>Semoga mimpi indah yaa 🌙✨</p>
<button onclick="putarLagu()">
Klik Aku
</button>
</div>
 <audio id="lagu" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function putarLagu() {
  document.getElementById("lagu").play();
  alert("Aku sayang kamu ❤️");
}
</script> 
  <script>
function buatHati() {
  const hati = document.createElement("div");
  hati.innerHTML = "💖";
  hati.style.position = "fixed";
  hati.style.left = Math.random() * window.innerWidth + "px";
  hati.style.top = "-30px";
  hati.style.fontSize = "30px";
  hati.style.zIndex = "9999";

  document.body.appendChild(hati);

  let posisi = -30;
  const animasi = setInterval(() => {
    posisi += 4;
    hati.style.top = posisi + "px";

    if (posisi > window.innerHeight) {
      clearInterval(animasi);
      hati.remove();
    }
  }, 30);
}

setInterval(buatHati, 700);
</script>
</body>
</html>
